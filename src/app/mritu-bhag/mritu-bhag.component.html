<div class="container">
  <!-- Hero Section -->
  <div class="hero-section">
    <h1>Mritu Bhag</h1>
    <p class="subtitle">The House of Death & Longevity</p>
  </div>

  <!-- Main Content -->
  <mat-card class="main-card">
    <mat-card-header>
      <mat-icon class="header-icon">schedule</mat-icon>
      <mat-card-title>Mritu Bhag Analysis</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <div class="filter-row">
        <mat-form-field appearance="fill" class="filter-select">
          <mat-label>Planets</mat-label>
          <mat-select [(value)]="selectedPlanets" (selectionChange)="onSelectionChange()" multiple>
            <mat-option *ngFor="let planet of allPlanets" [value]="planet">{{ planet }}</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="fill" class="filter-select">
          <mat-label>Degrees</mat-label>
          <mat-select [(value)]="selectedDegrees" (selectionChange)="onSelectionChange()" multiple>
            <mat-option *ngFor="let degree of allDegrees" [value]="degree">{{ degree }}</mat-option>
          </mat-select>
        </mat-form-field>

        <button mat-stroked-button color="accent" (click)="clearSelections()">
          <mat-icon>clear</mat-icon>
          Clear
        </button>
      </div>

      <div *ngIf="isLoading" class="loading-row">
        <mat-spinner diameter="40"></mat-spinner>
      </div>

      <div *ngIf="!isLoading && resultGrid.length === 0" class="message-row">
        Select planets and degrees to check Mritu Bhag combinations.
      </div>

      <div *ngIf="resultGrid.length > 0" class="table-wrapper">
        <table class="data-table">
          <tbody>
            <tr *ngFor="let row of resultGrid; let i = index">
              <td *ngFor="let cell of row; let j = index"
                  [class]="i === 0 ? 'header-cell' : (cell === 'Yes' ? 'mritu-yes' : cell === 'No' ? 'mritu-no' : 'header-cell')">
                {{ cell }}
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      
    </mat-card-content>
  </mat-card>
</div>
