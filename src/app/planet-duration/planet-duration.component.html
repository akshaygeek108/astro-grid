<div class="container">
  <!-- Hero Section -->
  <div class="hero-section">
    <h1>Planet Duration</h1>
    <p class="subtitle">Planetary Periods & Dashas</p>
  </div>

  <!-- Main Content -->
  <mat-card class="main-card">
    <mat-card-header>
      <mat-icon class="header-icon">schedule</mat-icon>
      <mat-card-title>Planet Duration Lookup</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <div class="filter-row">
        <mat-form-field appearance="fill" class="planet-select">
          <mat-label>Planet</mat-label>
          <mat-select multiple [(value)]="selectedPlanets" (selectionChange)="onPlanetSelectionChange()">
            <mat-option *ngFor="let planet of allPlanets" [value]="planet">{{ planet }}</mat-option>
          </mat-select>
        </mat-form-field>
        <button mat-stroked-button color="primary" class="select-all-button" (click)="toggleSelectAll()">
          {{ allSelected ? 'Clear All' : 'Select All' }}
        </button>
      </div>

      <div *ngIf="isLoading" class="loading-row">
        <mat-spinner diameter="40"></mat-spinner>
      </div>

      <div *ngIf="!isLoading && filteredData.length === 0" class="message-row">
        Select one or more planets to view the duration table.
      </div>

      <div *ngIf="filteredData.length > 0" class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>Planet</th>
              <th>Natal Chart D1</th>
              <th>Navasham D-9</th>
              <th>Sashtiamsha D-60</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let row of filteredData">
              <td>{{ row.planet }}</td>
              <td>{{ row.natalChartD1 }}</td>
              <td>{{ row.navanshD9 }}</td>
              <td>{{ row.sashtiamshaD60 }}</td>
            </tr>
          </tbody>
        </table>
      </div>

      
    </mat-card-content>
  </mat-card>
</div>
