<div class="container">
    <!-- Hero Section -->
    <div class="hero-section">
        <h1>Ages</h1>
        <p class="subtitle">Age Information in Astrology</p>
    </div>

    <mat-card class="main-card">
        <mat-card-header>
            <mat-icon class="header-icon">history</mat-icon>
            <mat-card-title>Age Lookup</mat-card-title>
        </mat-card-header>

        <mat-card-content>
            <div class="filter-row">
                <mat-form-field appearance="outline" class="filter-select">
                    <mat-label>House</mat-label>
                    <mat-select multiple [(value)]="selectedHouses" (selectionChange)="applyFilters()">
                        <mat-option *ngFor="let h of houses" [value]="h">{{ h }}</mat-option>
                    </mat-select>
                </mat-form-field>


                <mat-form-field appearance="outline" class="filter-select">
                    <mat-label>Planet</mat-label>
                    <mat-select multiple [(value)]="selectedPlanets" (selectionChange)="applyFilters()">
                        <mat-option *ngFor="let p of planets" [value]="p">{{ p }}</mat-option>
                    </mat-select>
                </mat-form-field>


                <button mat-stroked-button color="accent" (click)="clearFilters()">
                    <mat-icon>clear</mat-icon>
                    Clear
                </button>
                <button mat-stroked-button color="primary" (click)="loadAllData()">
                    <mat-icon>refresh</mat-icon>
                    Load All
                </button>

            </div>



            <div *ngIf="filtered.length === 0" class="message-row">
                Select one or more houses or planets to view the age table.
            </div>

            <div *ngIf="filtered.length > 0" class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>House</th>
                            <th>Planet</th>
                            <th>Year</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let r of filtered">
                            <td>{{ r.house }}</td>
                            <td>{{ r.planet }}</td>
                            <td>{{ r.year }}</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </mat-card-content>
    </mat-card>
</div>
