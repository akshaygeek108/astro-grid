<div class="container">
  <!-- Hero Section -->
  <div class="hero-section">
    <h1>Kakshya</h1>
    <p class="subtitle">Division, segment, sub-level, or layered structure</p>
  </div>

  <mat-card class="main-card">
    <mat-card-header>
      <mat-icon class="header-icon">grid_view</mat-icon>
      <mat-card-title>Kakshya Table</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <div class="filter-row">
        <mat-form-field appearance="outline" class="filter-select">
          <mat-label>Kakshya Number</mat-label>
          <mat-select multiple [(value)]="selectedkakshyaNumber" (selectionChange)="onSignSelectionChange()">
            <mat-option *ngFor="let kakshyaNumber of allkakshyaNumber" [value]="kakshyaNumber">{{ kakshyaNumber }}</mat-option>
          </mat-select>
        </mat-form-field>

        <button mat-stroked-button color="primary" class="select-all-button" (click)="toggleSelectAll()">
          {{ allSelected ? 'Clear All' : 'Select All' }}
        </button>
      </div>

      <div *ngIf="isLoading" class="loading-row">
        <mat-spinner diameter="40"></mat-spinner>
      </div>

      <div *ngIf="!isLoading && filteredData.length === 0" class="message-row">
        Select one or more kakshya numbers to view the age list.
      </div>

      <div *ngIf="filteredData.length > 0" class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>Kakshya Number</th>
              <th>Degrees</th>
              <th>Kakshya Lord</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let row of filteredData">
              <td>{{ row.kakshyaNumber }}</td>
              <td>{{ row.degrees }}</td>
              <td>{{ row.lord }}</td>
            </tr>
          </tbody>
        </table>
      </div>

      
    </mat-card-content>
  </mat-card>
</div>
