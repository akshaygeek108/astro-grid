<div class="container">
    <!-- Hero Section -->
    <div class="hero-section">
        <h1>BCP Age Calculator</h1>
        <p class="subtitle">Calculate the running age and cycle lords</p>
    </div>

    <mat-card class="main-card">
        <mat-tab-group>
            <mat-tab label="Age Calculator">
                <mat-card-content>
                    <mat-card-header>
                        <mat-icon class="header-icon">schedule</mat-icon>
                        <mat-card-title>Age List</mat-card-title>
                    </mat-card-header>

                    <mat-card-content>
                        <div class="filter-row">
                            <mat-form-field appearance="outline" class="filter-select">
                                <mat-label>Date of Birth</mat-label>

                                <input matInput placeholder="DD/MM/YYYY" [matDatepicker]="picker" [(ngModel)]="dob"
                                    readonly>

                                <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
                                <mat-datepicker #picker></mat-datepicker>
                            </mat-form-field>

                            <button mat-raised-button color="primary" (click)="calculateAge()">
                                <mat-icon>calculate</mat-icon>
                                Calculate
                            </button>

                            <button mat-stroked-button color="warn" (click)="clear()">
                                <mat-icon>delete</mat-icon>
                                Clear
                            </button>
                        </div>

                        <div class="filter-row" *ngIf="showResult">
                            <h2>Your Age </h2>


                            <p>
                                <strong>{{ result.years }}</strong> Years,
                                <strong>{{ result.months }}</strong> Months,
                                <strong>{{ result.days }}</strong> Days
                               
                            </p>
                        </div>
                        
                    <br/>
                    <div *ngIf="filteredData.length > 0" class="table-wrapper">
            <table class="data-table">
            <thead>
                <tr>
                <th>House</th>
                <th>Ages</th>
                
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let row of filteredData">
                <td>{{ row.house }}</td>
                    <td>{{ row.ages }}</td>
                </tr>
            </tbody>
            </table>
      </div>


                    </mat-card-content>
                </mat-card-content>
            </mat-tab>
            <mat-tab label="Cycle Lords">
                <mat-card-content>
                    <mat-card-header>
                        <mat-icon class="header-icon">schedule</mat-icon>
                        <mat-card-title>Cycle Lords</mat-card-title>
                    </mat-card-header>
              
                    <div *ngIf="bcpAgeCalcuatorData.length > 0" class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Cycle Lord</th>
                                    <th>Year</th>

                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let row of bcpAgeCalcuatorData">
                                    <td>{{ row.planet }}</td>
                                    <td>{{ row.year }}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                </mat-card-content>

            </mat-tab>
        </mat-tab-group>



    </mat-card>
</div>
